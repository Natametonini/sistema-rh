<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de RH</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f6f9;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background-color: #34495e;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #2c3e50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #1a252f;
    }
  </style>
</head>
<body>

<header>
  <h1>Sistema de RH</h1>
</header>

<nav>
  <a onclick="mostrar('cadastro')">Cadastro</a>
  <a onclick="mostrar('lista')">Funcionários</a>
</nav>

<div class="container">

  <!-- Cadastro -->
  <div id="cadastro" class="card">
    <h2>Cadastrar Funcionário</h2>
    <input type="text" id="nome" placeholder="Nome">
    <input type="text" id="cargo" placeholder="Cargo">
    <input type="number" id="salario" placeholder="Salário">
    <button onclick="adicionarFuncionario()">Adicionar</button>
  </div>

  <!-- Lista -->
  <div id="lista" class="card" style="display:none;">
    <h2>Lista de Funcionários</h2>
    <ul id="listaFuncionarios"></ul>
  </div>

</div>

<script>
  let funcionarios = [];

  function mostrar(secao) {
    document.getElementById('cadastro').style.display = 'none';
    document.getElementById('lista').style.display = 'none';
    document.getElementById(secao).style.display = 'block';
  }

  function adicionarFuncionario() {
    const nome = document.getElementById('nome').value;
    const cargo = document.getElementById('cargo').value;
    const salario = document.getElementById('salario').value;

    if (!nome || !cargo || !salario) {
      alert("Preencha todos os campos!");
      return;
    }

    funcionarios.push({ nome, cargo, salario });
    atualizarLista();

    document.getElementById('nome').value = '';
    document.getElementById('cargo').value = '';
    document.getElementById('salario').value = '';
  }

  function atualizarLista() {
    const lista = document.getElementById('listaFuncionarios');
    lista.innerHTML = '';

    funcionarios.forEach((f, index) => {
      const item = document.createElement('li');
      item.textContent = `${f.nome} - ${f.cargo} - R$ ${f.salario}`;
      lista.appendChild(item);
    });
  }
</script>

</body>
</html>
